# =============================================================================
# Upstream Sync Check — BentoPDF (Cainmani)
# =============================================================================
# Runs weekly and on manual trigger. Checks for:
#   1. New commits in upstream (alam00000/bentopdf)
#   2. New Docker image available on GHCR (verified from official source)
# Results are written to the workflow run summary (Actions tab).
# No issues or PRs are created — this is a read-only check.
# =============================================================================

name: Upstream Sync Check

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: read

jobs:
  check-upstream:
    runs-on: [self-hosted, cainmani]
    env:
      # Official upstream image — only alam00000 can push to this GHCR namespace
      PROD_IMAGE: ghcr.io/alam00000/bentopdf
      PROD_TAG: latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/alam00000/bentopdf.git 2>/dev/null || true
          git fetch upstream main

      - name: Check for new upstream commits
        id: check-commits
        run: |
          COMMITS=$(git log --oneline HEAD..upstream/main)
          if [ -z "$COMMITS" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "No new upstream commits."
          else
            COUNT=$(echo "$COMMITS" | wc -l)
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"

            EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "commits<<$EOF_MARKER" >> "$GITHUB_OUTPUT"
            echo "$COMMITS" >> "$GITHUB_OUTPUT"
            echo "$EOF_MARKER" >> "$GITHUB_OUTPUT"

            echo "Found $COUNT new upstream commit(s)."
          fi

      - name: Check for new Docker image
        id: check-image
        run: |
          IMAGE="${PROD_IMAGE}:${PROD_TAG}"

          # Verify we're pulling from the official GHCR namespace
          if [[ "$PROD_IMAGE" != ghcr.io/alam00000/* ]]; then
            echo "::error::Image source is not the official upstream namespace (ghcr.io/alam00000/). Aborting."
            exit 1
          fi

          # Get digest of currently running container (if any)
          RUNNING_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE" 2>/dev/null | sed 's/.*@//' || echo "none")

          # Fetch the latest digest from the registry without pulling the full image
          # docker buildx imagetools inspect gives us the digest from the registry manifest
          LATEST_DIGEST=$(docker buildx imagetools inspect "$IMAGE" 2>/dev/null | grep -m1 "^Digest:" | awk '{print $2}' || echo "unknown")

          if [ "$LATEST_DIGEST" = "unknown" ]; then
            echo "::warning::Could not fetch latest image digest from registry."
            echo "image_updated=false" >> "$GITHUB_OUTPUT"
          elif [ "$RUNNING_DIGEST" = "$LATEST_DIGEST" ]; then
            echo "image_updated=false" >> "$GITHUB_OUTPUT"
            echo "Docker image is up to date."
          else
            echo "image_updated=true" >> "$GITHUB_OUTPUT"
            echo "running_digest=$RUNNING_DIGEST" >> "$GITHUB_OUTPUT"
            echo "latest_digest=$LATEST_DIGEST" >> "$GITHUB_OUTPUT"
            echo "New Docker image available!"
            echo "  Running:  $RUNNING_DIGEST"
            echo "  Latest:   $LATEST_DIGEST"
          fi

      - name: Write summary
        env:
          COMMITS_AVAILABLE: ${{ steps.check-commits.outputs.up_to_date == 'false' }}
          COMMIT_COUNT: ${{ steps.check-commits.outputs.count }}
          COMMITS: ${{ steps.check-commits.outputs.commits }}
          IMAGE_UPDATED: ${{ steps.check-image.outputs.image_updated }}
          RUNNING_DIGEST: ${{ steps.check-image.outputs.running_digest }}
          LATEST_DIGEST: ${{ steps.check-image.outputs.latest_digest }}
        run: |
          # Nothing to report
          if [ "$COMMITS_AVAILABLE" != "true" ] && [ "$IMAGE_UPDATED" != "true" ]; then
            echo "### ✅ Up to date" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No new upstream commits or Docker image updates." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Image:** \`${PROD_IMAGE}:${PROD_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Source:** [alam00000/bentopdf](https://github.com/alam00000/bentopdf)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "### ⚠️ Upstream updates available" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$COMMITS_AVAILABLE" = "true" ]; then
            echo "#### New commits" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**${COMMIT_COUNT}** new commit(s) in [alam00000/bentopdf](https://github.com/alam00000/bentopdf) since last sync." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Commit list</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$COMMITS" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$IMAGE_UPDATED" = "true" ]; then
            echo "#### New Docker image" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "A new version of \`${PROD_IMAGE}:${PROD_TAG}\` is available from the official upstream registry." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| | Digest |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Running** | \`${RUNNING_DIGEST}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Latest** | \`${LATEST_DIGEST}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "#### To update" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          if [ "$COMMITS_AVAILABLE" = "true" ]; then
            echo "# Merge upstream commits" >> "$GITHUB_STEP_SUMMARY"
            echo "git fetch upstream" >> "$GITHUB_STEP_SUMMARY"
            echo "git merge upstream/main" >> "$GITHUB_STEP_SUMMARY"
            echo "git push origin main" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "# On server: pull latest image and restart" >> "$GITHUB_STEP_SUMMARY"
          echo "docker compose -f docker-compose.prod.yml pull bentopdf" >> "$GITHUB_STEP_SUMMARY"
          echo "docker compose -f docker-compose.prod.yml up -d" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
