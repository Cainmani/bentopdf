# =============================================================================
# Upstream Sync Check — BentoPDF (Cainmani)
# =============================================================================
# Runs weekly and on manual trigger. Checks for:
#   1. New commits in upstream (alam00000/bentopdf)
#   2. New Docker image available on GHCR
# Opens an issue if either is detected.
#
# GUARDRAIL: This is a FORK. All gh CLI commands MUST target Cainmani/bentopdf.
# GH_REPO is set at the job level as a safety net — gh will default to our
# repo even if --repo is accidentally omitted. All gh commands also use
# explicit --repo flags as defense-in-depth.
# =============================================================================

name: Upstream Sync Check

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  check-upstream:
    runs-on: [self-hosted, cainmani]
    env:
      # GUARDRAIL: Force all gh CLI commands to target our fork, not upstream.
      # This prevents accidental issue/PR creation on alam00000/bentopdf.
      GH_REPO: ${{ github.repository }}
      PROD_IMAGE: ghcr.io/alam00000/bentopdf:latest
    steps:
      - name: Verify target repository
        run: |
          if [ "$GH_REPO" = "alam00000/bentopdf" ]; then
            echo "::error::FATAL: GH_REPO points to upstream repo. This workflow must only target the fork."
            exit 1
          fi
          echo "Target repository: $GH_REPO"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/alam00000/bentopdf.git 2>/dev/null || true
          git fetch upstream main

      - name: Check for new upstream commits
        id: check-commits
        run: |
          COMMITS=$(git log --oneline HEAD..upstream/main)
          if [ -z "$COMMITS" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "No new upstream commits."
          else
            COUNT=$(echo "$COMMITS" | wc -l)
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"

            # Save commit list for the issue body
            EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "commits<<$EOF_MARKER" >> "$GITHUB_OUTPUT"
            echo "$COMMITS" >> "$GITHUB_OUTPUT"
            echo "$EOF_MARKER" >> "$GITHUB_OUTPUT"

            echo "Found $COUNT new upstream commit(s)."
          fi

      - name: Check for new Docker image
        id: check-image
        run: |
          # Get the digest of the currently deployed image
          DEPLOYED_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$PROD_IMAGE" 2>/dev/null | sed 's/.*@//' || echo "not-deployed")

          # Pull latest manifest without downloading the full image
          docker pull "$PROD_IMAGE" > /dev/null 2>&1
          LATEST_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$PROD_IMAGE" 2>/dev/null | sed 's/.*@//' || echo "unknown")

          if [ "$DEPLOYED_DIGEST" = "$LATEST_DIGEST" ]; then
            echo "image_updated=false" >> "$GITHUB_OUTPUT"
            echo "Docker image is up to date."
          else
            echo "image_updated=true" >> "$GITHUB_OUTPUT"
            echo "deployed_digest=${DEPLOYED_DIGEST:0:19}" >> "$GITHUB_OUTPUT"
            echo "latest_digest=${LATEST_DIGEST:0:19}" >> "$GITHUB_OUTPUT"
            echo "New Docker image available!"
            echo "  Deployed: $DEPLOYED_DIGEST"
            echo "  Latest:   $LATEST_DIGEST"
          fi

      - name: Create or update issue
        if: steps.check-commits.outputs.up_to_date == 'false' || steps.check-image.outputs.image_updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMITS_AVAILABLE: ${{ steps.check-commits.outputs.up_to_date == 'false' }}
          COMMIT_COUNT: ${{ steps.check-commits.outputs.count }}
          COMMITS: ${{ steps.check-commits.outputs.commits }}
          IMAGE_UPDATED: ${{ steps.check-image.outputs.image_updated }}
          DEPLOYED_DIGEST: ${{ steps.check-image.outputs.deployed_digest }}
          LATEST_DIGEST: ${{ steps.check-image.outputs.latest_digest }}
        run: |
          # Build title
          PARTS=""
          if [ "$COMMITS_AVAILABLE" = "true" ]; then
            PARTS="${COMMIT_COUNT} new commit(s)"
          fi
          if [ "$IMAGE_UPDATED" = "true" ]; then
            [ -n "$PARTS" ] && PARTS="$PARTS + "
            PARTS="${PARTS}new Docker image"
          fi
          TITLE="Upstream sync: ${PARTS} available"

          # Build body
          BODY="## Upstream changes detected"$'\n\n'

          if [ "$COMMITS_AVAILABLE" = "true" ]; then
            BODY="${BODY}### New commits"$'\n\n'
            BODY="${BODY}**${COMMIT_COUNT}** new commit(s) in [alam00000/bentopdf](https://github.com/alam00000/bentopdf) since our last sync."$'\n\n'
            BODY="${BODY}\`\`\`"$'\n'
            BODY="${BODY}${COMMITS}"$'\n'
            BODY="${BODY}\`\`\`"$'\n\n'
          fi

          if [ "$IMAGE_UPDATED" = "true" ]; then
            BODY="${BODY}### New Docker image"$'\n\n'
            BODY="${BODY}A new version of \`ghcr.io/alam00000/bentopdf:latest\` is available."$'\n\n'
            BODY="${BODY}| | Digest |"$'\n'
            BODY="${BODY}|---|---|"$'\n'
            BODY="${BODY}| **Deployed** | \`${DEPLOYED_DIGEST}\` |"$'\n'
            BODY="${BODY}| **Latest** | \`${LATEST_DIGEST}\` |"$'\n\n'
          fi

          BODY="${BODY}### To update"$'\n\n'
          BODY="${BODY}\`\`\`bash"$'\n'
          if [ "$COMMITS_AVAILABLE" = "true" ]; then
            BODY="${BODY}# Merge upstream commits"$'\n'
            BODY="${BODY}git fetch upstream"$'\n'
            BODY="${BODY}git merge upstream/main"$'\n'
            BODY="${BODY}git push origin main"$'\n\n'
          fi
          BODY="${BODY}# On server: pull latest image and restart"$'\n'
          BODY="${BODY}docker compose -f docker-compose.prod.yml pull bentopdf"$'\n'
          BODY="${BODY}docker compose -f docker-compose.prod.yml up -d"$'\n'
          BODY="${BODY}\`\`\`"$'\n\n'
          BODY="${BODY}_This issue was created automatically by the upstream sync check workflow._"

          # Close any existing upstream sync issues first
          gh issue list --repo "${{ github.repository }}" --label "upstream-sync" --state open --json number --jq '.[].number' | while read -r num; do
            gh issue close "$num" --repo "${{ github.repository }}" --comment "Superseded by new check."
          done

          # Create new issue
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "upstream-sync"
